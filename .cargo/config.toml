[unstable]
build-std-features = ["compiler-builtins-mem"]
build-std = ["core", "compiler_builtins", "alloc"]
bindeps = true
json-target-spec = true

[build]
target = "x86_64-unknown-none"
rustflags = [
  "-C", "force-frame-pointers=yes",
  "-C", "debuginfo=0",
  "-C", "opt-level=0",
]

[target.x86_64-unknown-none]
linker = "rust-lld"
rustflags = [
  "-C", "link-arg=--whole-archive",
  "-C", "link-arg=-lnullex",
  "-C", "link-arg=--no-whole-archive",
  "-C", "relocation-model=static",
  "-C", "code-model=kernel",
]

[env]
AS = "x86_64-elf-as"
CC_x86_64_unknown_none = "x86_64-elf-gcc"
AR_x86_64_unknown_none = "x86_64-elf-ar"
LD_x86_64_unknown_none = "x86_64-elf-ld"